<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход — DentalCare Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/admin/assets/styles.css">
    <style>
      .login-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(1200px 600px at 100% -10%, var(--primary-soft), transparent),
          var(--bg);
      }
      .login-card {
        width: 100%;
        max-width: 380px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 18px 50px rgba(23, 32, 51, 0.12);
      }
      .login-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .brand-mark {
        display: grid;
        place-items: center;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        font-weight: 700;
      }
      .brand-title { font-weight: 700; font-size: 16px; }
      .brand-subtitle { color: var(--muted); font-size: 12px; }
      .login-error {
        display: none;
        margin-top: 12px;
        color: var(--danger);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="login-wrap">
      <form class="login-card" id="loginForm">
        <div class="login-brand">
          <span class="brand-mark">DC</span>
          <div>
            <div class="brand-title">DentalCare Admin</div>
            <div class="brand-subtitle">вход в панель управления</div>
          </div>
        </div>

        <label class="form-label" for="username">Логин</label>
        <input class="form-control mb-3" id="username" name="username" autocomplete="username" autofocus required>

        <label class="form-label" for="password">Пароль</label>
        <input class="form-control mb-3" id="password" name="password" type="password" autocomplete="current-password" required>

        <button class="btn btn-primary w-100" type="submit" id="loginButton">Войти</button>
        <div class="login-error" id="loginError"></div>
      </form>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const errorBox = document.getElementById("loginError");
      const button = document.getElementById("loginButton");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorBox.style.display = "none";
        button.disabled = true;
        button.textContent = "Вход...";
        try {
          const response = await fetch("/api/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: document.getElementById("username").value,
              password: document.getElementById("password").value
            })
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || "Не удалось войти");
          window.location.href = "/admin";
        } catch (error) {
          errorBox.textContent = error.message;
          errorBox.style.display = "block";
          button.disabled = false;
          button.textContent = "Войти";
        }
      });
    </script>
  </body>
</html>
